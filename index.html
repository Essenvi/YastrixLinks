<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yastrix - Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(90deg, #3a3a3a 0%, #5a5a5a 50%, #3a3a3a 100%);
            color: white;
            min-height: 100vh;
        }
        
        /* ANIMAÇÃO PISCANTE */
        @keyframes pulso {
            0% { box-shadow: 0 8px 25px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 25px #fff, 0 0 45px rgba(255,255,255,0.6); border-color: #fff; }
            100% { box-shadow: 0 8px 25px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
        }
        .piscando {
            animation: pulso 1.5s infinite ease-in-out;
        }

        /* HEADER */
        .header {
            position: relative;
            height: 200px;
            background: linear-gradient(rgba(58,58,58,0.7), rgba(58,58,58,0.5)), 
                        url('https://i.postimg.cc/VLyhQc4c/Screenshot-2026-03-31-15-21-49-942-com-instagram-android-edit.jpg');
            background-size: cover;
            background-position: center 15%;
            display: flex;
            align-items: center;
            padding: 0 40px;
            margin-bottom: 40px;
        }
        
        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .name {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        
        /* CORES DAS PLATAFORMAS */
        .bg-privacy { background-color: #ffffff !important; color: #000 !important; }
        .bg-instagram { background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D) !important; color: white !important; }
        .bg-prive { background-color: #380106 !important; color: white !important; } /* Laranja Câmera Privê */
        .bg-amazon { background-color: #FF9900 !important; color: #000 !important; }
        .bg-twitter { background-color: #1DA1F2 !important; color: white !important; }
        .bg-tiktok { background-color: #000000 !important; color: white !important; }
        .bg-telegram { background-color: #0088CC !important; color: white !important; }

        /* TOP LOGOS */
        .top-logos {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        
        .logo-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo-item:hover { transform: translateY(-5px); }
        
        .logo-icon {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .logo-icon img { width: 30px; height: 30px; object-fit: contain; }
        
        .logo-name {
            font-size: 0.9em;
            font-weight: 600;
            padding: 6px 14px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* GALERIA - GRID 3-3-1 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px 50px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .photo-card:hover { transform: translateY(-10px); }
        
        .photo-container { position: relative; width: 100%; height: 320px; overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .photo-card:hover .photo-container img { transform: scale(1.05); }
        
        .photo-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .photo-logo img { width: 25px; height: 25px; }
        .photo-logo i { font-size: 1.2em; }
        
        .platform-name {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 18px;
            text-align: center;
            font-weight: 600;
            background: rgba(40, 40, 40, 0.8);
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .gallery .photo-card:nth-child(7) { grid-column: 2; }
        
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .gallery .photo-card:nth-child(7) { grid-column: auto; }
            .header { height: 150px; padding: 0 20px; }
            .top-logos { gap: 15px; }
            .logo-icon { width: 55px; height: 55px; font-size: 1.5em; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
